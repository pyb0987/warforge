  pr_swarm_sense:
    name: 군체 감각
    tier: 2
    theme: predator
    comp:
    - unit: pr_spider
      n: 3
    - unit: pr_larva
      n: 3
    tags:
    - predator
    - combat
    impl: theme_system
    stars:
      1:
        effects:
        - trigger_timing: BS
          max_act: -1
          swarm_buff:
            target: all_predator
            atk_per_unit: 0.1
            per_n: 3
      2:
        effects:
        - trigger_timing: BS
          max_act: -1
          conditional:
          - when:
              unit_count_gte: 10
            debuff_store:
              stat: as
              target: all_enemy
              base_pct: 0.15
              cap: 0.3
          swarm_buff:
            target: all_predator
            atk_per_unit: 0.12
            per_n: 3
      3:
        effects:
        - trigger_timing: BS
          max_act: -1
          conditional:
          - when:
              unit_count_gte: 10
            debuff_store:
            - stat: as
              target: all_enemy
              base_pct: 0.2
              cap: 0.4
            - stat: atk
              target: all_enemy
              base_pct: 0.15
              cap: 0.3
          swarm_buff:
            target: all_predator
            atk_per_unit: 0.12
            per_n: 2
  pr_harvest:
    name: 변태 수확
