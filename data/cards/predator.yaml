          max_act: 3
          listen:
            l2: HA
          require_other: true
          hatch:
            target: self
            count: 1
          enhance:
            target: self
            atk_pct: 0.03
            ol1: null
        - trigger_timing: OE
          max_act: 3
          listen:
            l2: MT
          require_other: true
          meta_consume:
            consume: 1
          enhance:
            target: self
            atk_pct: 0.03
            ol1: null
      2:
        effects:
        - trigger_timing: OE
          max_act: 5
          listen:
            l2: HA
          require_other: true
          hatch:
            target: self
            count: 1
          enhance:
            target: self
            atk_pct: 0.03
            ol1: null
        - trigger_timing: OE
          max_act: 5
          listen:
            l2: MT
          require_other: true
          meta_consume:
            consume: 1
          enhance:
            target: self
            atk_pct: 0.03
            ol1: null
      3:
        effects:
        - trigger_timing: OE
          max_act: -1
          listen:
            l2: HA
          require_other: true
          hatch:
            target: self
            count: 2
          enhance:
            target: self
            atk_pct: 0.03
            ol1: null
        - trigger_timing: OE
          max_act: -1
          listen:
            l2: MT
          require_other: true
          meta_consume:
            consume: 1
            count: 2
          enhance:
            target: self
            atk_pct: 0.03
            ol1: null
  pr_parasitic_swarm:
    name: 기생충 군체
