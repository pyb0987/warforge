cards:
  pr_nest:
    name: 유충 둥지
    tier: 1
    theme: predator
    comp:
    - unit: pr_larva
      n: 3
    - unit: pr_worker
      n: 1
    tags:
    - predator
    - hatch
    impl: theme_system
    stars:
      1:
        effects:
        - trigger_timing: RS
          max_act: -1
          hatch:
          - target: self
            count: 2
          - target: right_adj
            count: 1
      2:
        effects:
        - trigger_timing: RS
          max_act: -1
          hatch:
          - target: self
            count: 4
          - target: right_adj
            count: 2
      3:
