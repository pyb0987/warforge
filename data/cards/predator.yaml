            count: 1
      2:
        effects:
        - trigger_timing: OE
          max_act: 2
          listen:
            l2: MT
          enhance:
            target: tag:carapace
            atk_pct: 0.07
            hp_pct: 0.07
            ol1: null
          hatch:
            target: right_adj
            count: 1
      3:
        effects:
        - trigger_timing: OE
          max_act: 3
          listen:
            l2: MT
          enhance:
            target: all_predator
            atk_pct: 0.07
            hp_pct: 0.07
            ol1: null
          hatch:
            target: both_adj
            count: 1
          shield:
            target: event_source
            hp_pct: 0.2
  pr_parasite:
    name: 기생 진화
    tier: 4
    theme: predator
    comp:
    - unit: pr_apex
      n: 2
    - unit: pr_flyer
      n: 3
    - unit: pr_sniper
      n: 1
    tags:
    - predator
    - combat
    impl: theme_system
    stars:
      1:
        effects:
        - trigger_timing: PC
          max_act: -1
          hatch_scaled:
            target: self
            per_units: 1
            cap: 3
          on_combat_result:
            condition: victory
            effects:
            - meta_consume:
                consume: 2
      2:
        effects:
        - trigger_timing: PC
          max_act: -1
          hatch_scaled:
            target: self
            per_units: 2
            cap: 5
          on_combat_result:
            condition: victory
            effects:
            - meta_consume:
                consume: 2
                count: 2
            - enhance:
                target: self
                hp_pct: 0.15
                ol1: null
      3:
        effects:
        - trigger_timing: PC
          max_act: -1
          hatch_scaled:
            target: self
            per_units: 2
            cap: 5
          on_combat_result:
            condition: always
            effects:
            - meta_consume:
                consume: 1
                count: 2
            - enhance:
                target: self
                hp_pct: 0.2
                ol1: null
            - shield:
                target: self
                hp_pct: 0.3
  pr_apex_hunt:
    name: 포식자의 사냥
    tier: 4
    theme: predator
    comp:
    - unit: pr_apex
      n: 3
    - unit: pr_guardian
      n: 1
    tags:
    - predator
    - predation
    impl: theme_system
    # 2026-04-21 재설계: conditional (unit_count_lte: 5) 제거 + RS 자체 기동
    # 추가 + OE require_other: true.
    # 이전: MT 이벤트 외부 소스 + 유닛 ≤5 조건이 실전에서 거의 미충족.
    # 신: RS 에서 meta_consume(consume=1, net 0, 자체 유닛 강화).
    #     OE 는 다른 카드의 변태에만 반응 (require_other) — 자기 MT 체인으로
    #     max_act 까지 자동 소진되는 동작 방지. pr_molt / pr_parasite(PC) /
    #     다른 pr_apex_hunt 등 외부 MT 소스에 반응해 ATK buff + 추가 meta.
    stars:
      1:
        effects:
        - trigger_timing: OE
          max_act: 1
          listen:
            l2: MT
          require_other: true
          buff:
            target: self
            atk_pct: 0.3
          meta_consume:
            consume: 2
        - trigger_timing: RS
          max_act: -1
          meta_consume:
            consume: 1
      2:
        effects:
        - trigger_timing: OE
          max_act: 2
          listen:
            l2: MT
          require_other: true
          buff:
            target: self
            atk_pct: 0.5
          meta_consume:
            consume: 2
        - trigger_timing: RS
          max_act: -1
          meta_consume:
            consume: 1
      3:
        effects:
        - trigger_timing: OE
          max_act: 2
          listen:
            l2: MT
          require_other: true
          buff:
            target: self
            atk_mult: 2.0
          meta_consume:
            consume: 1
        - trigger_timing: RS
          max_act: -1
          meta_consume:
            consume: 1
  pr_transcend:
    name: 군체 초월
    tier: 5
