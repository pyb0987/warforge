# ═══════════════════════════════════════════════════════════════════════════
# Conscript pool (2026-04-21 재설계, 해석 B):
#   - 모든 징집은 이 base pool 에서 **동등 확률** 1종 뽑기 (이전 weight 가중
#     랜덤 → uniform).
#   - 뽑힌 유닛은 각 항목의 `count` 만큼 한번에 추가 (이전엔 항상 1기).
#     즉 "신병 뽑히면 3기 (물량)", "바이커 뽑히면 2기", "저격 등 단일 유닛 1기".
#   - R4 도달 카드 징집: ENHANCED_MAP 통해 강화 버전으로 자동 변환.
#   - R10 도달 카드 징집: 기본 뽑기 + 엘리트 유닛 1기 보너스 (elite_units 에서).
#   - 디자이너 튜닝 지점: 여기 count 값을 조정하면 유닛 공급량이 직접 변함.
# ═══════════════════════════════════════════════════════════════════════════
conscript_pool:
- id: ml_recruit
  count: 3
- id: ml_drone
  count: 2
- id: ml_biker
  count: 2
- id: ml_infantry
  count: 1
- id: ml_shield
  count: 1
- id: ml_plasma
  count: 1

# R10 도달 시 기본 뽑기에 더해 이 목록에서 랜덤 1기 추가. 동등 확률.
elite_units:
- ml_sniper
- ml_artillery
- ml_walker
- ml_commander

cards:
  ml_barracks:
    name: 신병 훈련소
    tier: 1
    theme: military
    comp:
    - unit: ml_recruit
      n: 2
    - unit: ml_shield
      n: 1
    tags:
    - military
    - training
    impl: theme_system
    stars:
      1:
        effects:
        - trigger_timing: RS
          max_act: -1
          r_conditional:
          - when:
              rank_gte: 4
            train:
              target: left_adj
              amount: 1
          - when:
              rank_gte: 10
            train:
              target: far_military
              amount: 1
          train:
          - target: self
            amount: 1
          - target: right_adj
            amount: 1
      2:
        effects:
        - trigger_timing: RS
          max_act: -1
          r_conditional:
          - when:
              rank_gte: 4
            train:
              target: left_adj
              amount: 1
          - when:
              rank_gte: 10
            train:
              target: far_military
              amount: 1
          train:
          - target: self
            amount: 2
          - target: right_adj
            amount: 1
      3:
        effects:
        - trigger_timing: RS
          max_act: -1
          r_conditional:
          - when:
              rank_gte: 4
            train:
              target: left_adj
              amount: 1
          - when:
              rank_gte: 10
            train:
              target: far_military
              amount: 1
          train:
          - target: self
            amount: 2
          - target: right_adj
            amount: 1
          high_rank_mult:
            rank: 15
            atk_mult: 1.3
  ml_conscript:
    name: 징병국
    tier: 1
    theme: military
    comp:
    - unit: ml_recruit
      n: 2
    - unit: ml_drone
      n: 1
    tags:
    - military
    - conscript
    impl: theme_system
    # 2026-04-21 해석 B 재설계:
    #   conscript.count = "뽑기 횟수" (이전 "유닛 수"). 각 뽑기는 base pool
    #   uniform 1 선택 → 유닛별 count 만큼 추가. 평균 1.67 기/뽑기.
    #   R4/R10 변환·엘리트 보너스는 runtime 이 source_card rank 로 자동 적용
    #   (conscript_pool_tier action 제거됨 — pool tier 개념 사라짐).
    #   ★별 self 뽑기 횟수: ★1 1 / ★2 2 / ★3 3.
    stars:
      1:
        effects:
        - trigger_timing: RS
          max_act: -1
          conscript:
            target: self
            count: 1
            rank_upgrade: true
      2:
        effects:
        - trigger_timing: RS
          max_act: -1
          conscript:
          - target: self
            count: 1
            rank_upgrade: true
          - target: both_adj
            count: 1
            rank_upgrade: true
      3:
        effects:
        - trigger_timing: RS
          max_act: -1
          conditional:
          - when:
              unit_count_gte: 12
            buff:
              target: all_military
              atk_pct: 0.1
          conscript:
          - target: self
            count: 3
            rank_upgrade: true
          - target: both_adj
            count: 1
            rank_upgrade: true
  ml_outpost:
    name: 전진 기지
    tier: 2
    theme: military
    comp:
    - unit: ml_recruit
      n: 2
    - unit: ml_shield
      n: 1
    - unit: ml_drone
      n: 1
    tags:
    - military
    - frontline
    impl: theme_system
    star_scalable_actions:
    - conscript
    # 2026-04-21 재설계:
    #   기존: r_conditional (R4 event_target_adj 징집, R10 far_event_military 징집)
    #         + enhanced_count 로 강화 변환 강제.
    #   신: 징집 자체가 R4/R10 효과 (50% / 100% 강화 변환 + 엘리트 보너스) 를
    #       가지므로 outpost 에서 별도 강화 파라미터 중복 제거. r_conditional
    #       모두 제거 (R4/R10 구조 차등 → 단순 ★ 별 이원 징집).
    #   require_other: true (C6): 자기 CO 이벤트 무시 → 외부 CO 에만 반응.
    stars:
      1:
        effects:
        - trigger_timing: OE
          max_act: 2
          listen:
            l2: CO
          require_other: true
          conscript:
            target: event_target
            count: 1
      2:
        effects:
        - trigger_timing: OE
          max_act: 2
          listen:
            l2: CO
          require_other: true
          conscript:
          - target: self
            count: 1
            rank_upgrade: true
          - target: event_target
            count: 1
      3:
        effects:
        - trigger_timing: OE
          max_act: 2
          listen:
            l2: CO
          require_other: true
          conscript:
          - target: self
            count: 2
            rank_upgrade: true
          - target: event_target
            count: 2
          train:
          - target: self
            amount: 1
          - target: event_target
            amount: 1
