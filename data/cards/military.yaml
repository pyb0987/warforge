# data/cards/military.yaml
# Source of truth for Military cards.
# Generated YAML — edit here, run codegen to update card_db.gd.
#
# Redesign (2026-04-16): R3/5/8 임계점 시스템 제거 → R4/R10 두 milestone.
# 각 카드에 ★(양적 스케일링) / R(질적 전환) 두 축이 직교.
# 공통 R 효과: R4=이 카드 비(강화) 유닛 절반을 (강화)로, R10=전원 (강화).
#
# 구현 필요 항목 (placeholder field들 — 별도 스프린트):
#   - crit_buff, crit_splash (특수작전대)
#   - revive scope 확장 (통합사령부)
#   - upgrade_shop_bonus (군수공장)
#   - rank_buff hp_per_rank, as_bonus (전술사령부)
#   - enhance_convert (군사학교 R4)
#   - upgrade_attach (보급부대 R10 제거됨, 대신 골드+테라진)
#   - conscript_pool_tier (징병국 R4/R10)
#   - lifesteal on swarm_buff (돌격편대 R10)

cards:
  ml_barracks:
    name: 신병 훈련소
    tier: 1
    theme: military
    timing: RS
    comp:
      - {unit: ml_recruit, n: 2}
      - {unit: ml_infantry, n: 1}
    tags: [military, training]
    impl: theme_system
    stars:
      1:
        max_act: -1
        effects:
          - train: {target: self, amount: 1}
          - train: {target: right_adj, amount: 1}
        r_conditional:
          # 차분(delta) 표현: 기본 train이 self+right_adj이므로,
          # R4에서는 left_adj만 추가(합치면 양쪽), R10에서는 far_military 추가(나머지 군대).
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}  # 비(강화) 절반 → (강화)
              - train: {target: left_adj, amount: 1}   # 왼쪽 인접 추가 (양쪽 훈련 완성)
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}  # 전원 (강화)
              - train: {target: far_military, amount: 1}  # self/인접 제외한 나머지 군대
      2:
        max_act: -1
        effects:
          - train: {target: self, amount: 2}
          - train: {target: right_adj, amount: 1}
        r_conditional:
          # 차분 표현 (★1과 동일): R4=+left_adj, R10=+far_military
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - train: {target: left_adj, amount: 1}
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - train: {target: far_military, amount: 1}
      3:
        max_act: -1
        effects:
          - train: {target: self, amount: 2}
          - train: {target: right_adj, amount: 1}
          - high_rank_mult: {rank: 15, atk_mult: 1.3}  # 고위 임계 곱연산
        r_conditional:
          # 차분 표현 (★1과 동일): R4=+left_adj, R10=+far_military
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - train: {target: left_adj, amount: 1}
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - train: {target: far_military, amount: 1}

  ml_conscript:  # 징병국 (self 징집형 — 스왑 전 ml_outpost 역할)
    name: 징병국
    tier: 1
    theme: military
    timing: RS
    comp:
      - {unit: ml_recruit, n: 3}
      - {unit: ml_drone, n: 1}
    tags: [military, conscript]
    impl: theme_system
    stars:
      1:
        max_act: -1
        effects:
          - conscript: {target: self, count: 2}
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - conscript_pool_tier: {tier: enhanced}  # 징집 풀에 (강화) 포함
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - conscript_pool_tier: {tier: elite}     # 엘리트 유닛 포함 (저격드론/워커/궤도포대)
      2:
        max_act: -1
        effects:
          - conscript: {target: self, count: 2}
          - conscript: {target: both_adj, count: 1}
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - conscript_pool_tier: {tier: enhanced}
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - conscript_pool_tier: {tier: elite}
      3:
        max_act: -1
        effects:
          - conscript: {target: self, count: 3}
          - conscript: {target: both_adj, count: 1}
        conditional:
          - when: {unit_count_gte: 12}
            effects:
              - buff: {target: all_military, atk_pct: 0.10}
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - conscript_pool_tier: {tier: enhanced}
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - conscript_pool_tier: {tier: elite}

  ml_outpost:  # 전진기지 (반응 증폭형 — 스왑 전 ml_conscript 역할)
    name: 전진 기지
    tier: 2
    theme: military
    timing: OE
    listen: {l2: CO}
    comp:
      - {unit: ml_recruit, n: 2}
      - {unit: ml_shield, n: 1}
    tags: [military, frontline]
    impl: theme_system
    stars:
      1:
        max_act: 2
        effects:
          - conscript: {target: event_target, count: 1}
        r_conditional:
          # 차분 표현: R0=event_target, R4=+event_target_adj (이벤트+인접),
          # R10=+far_event_military (이벤트/인접 제외한 나머지 군대)
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - conscript: {target: event_target_adj, count: 1}  # 이벤트 카드 인접도 증원
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - conscript: {target: far_event_military, count: 1}  # 이벤트/인접 제외한 나머지 군대
      2:
        max_act: 3
        effects:
          - conscript: {target: event_target, count: 2, enhanced: partial}
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - conscript: {target: event_target_adj, count: 1, enhanced: partial}
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - conscript: {target: far_event_military, count: 1, enhanced: partial}
      3:
        max_act: 3
        effects:
          - conscript: {target: event_target, count: 2, enhanced: all}
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - conscript: {target: event_target_adj, count: 1, enhanced: all}
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - conscript: {target: far_event_military, count: 1, enhanced: all}

  ml_academy:
    name: 군사 학교
    tier: 2
    theme: military
    timing: OE
    listen: {l2: TR}
    comp:
      - {unit: ml_commander, n: 1}
      - {unit: ml_infantry, n: 1}
    tags: [military, training]
    impl: theme_system
    stars:
      1:
        max_act: 2
        effects:
          - train: {target: event_target, amount: 1}
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - enhance_convert_target: {count: 1, max_per_round: 1}  # 훈련 대상의 비(강화) 1기 → (강화)
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - spawn_enhanced_random: {target: event_target, count: 2, max_per_round: 1}  # 훈련 대상에 랜덤 (강화) 2기 추가
      2:
        max_act: 3
        effects:
          - train: {target: event_target, amount: 1}
          - enhance: {target: event_target, atk_pct: 0.02, ol1: null}
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - enhance_convert_target: {count: 1, max_per_round: 1}
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - spawn_enhanced_random: {target: event_target, count: 2, max_per_round: 1}
      3:
        max_act: 3
        effects:
          - train: {target: event_target, amount: 2}
          - enhance: {target: event_target, atk_pct: 0.03, ol1: null}
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - enhance_convert_target: {count: 1, max_per_round: 1}
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - spawn_enhanced_random: {target: event_target, count: 2, max_per_round: 1}

  ml_supply:
    name: 보급 부대
    tier: 2
    theme: military
    timing: PC
    comp:
      - {unit: ml_drone, n: 1}
      - {unit: ml_biker, n: 1}
    tags: [military, supply]
    impl: theme_system
    stars:
      1:
        max_act: -1
        effects:
          - economy:
              gold_base: 1
              gold_per: 0.5
              gold_per_unit: cards
              halve_on_loss: true
        r_conditional:
          # 차분 표현: R4에서 +1 테라진, R10에서 추가 +1 테라진(총 2) + 골드 +1.
          # 누적 구조이므로 R4 효과는 R10에 포함 (덧셈 방식).
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - grant_terazin: {amount: 1}
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - grant_terazin: {amount: 1}   # R4와 누적하여 총 +2 테라진
              - grant_gold: {amount: 1}
      2:
        max_act: -1
        effects:
          - economy:
              gold_base: 2
              gold_per: 1.0
              gold_per_unit: cards
              halve_on_loss: false
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - grant_terazin: {amount: 1}
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - grant_terazin: {amount: 1}  # R4와 누적하여 총 +2 테라진
              - grant_gold: {amount: 1}
      3:
        max_act: -1
        effects:
          - economy:
              gold_base: 2
              gold_per: 1.0
              gold_per_unit: cards
              halve_on_loss: false
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - grant_terazin: {amount: 1}
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - grant_terazin: {amount: 1}  # R4와 누적하여 총 +2 테라진
              - grant_gold: {amount: 1}

  ml_tactical:
    name: 전술 사령부
    tier: 3
    theme: military
    timing: BS
    comp:
      - {unit: ml_commander, n: 1}
      - {unit: ml_plasma, n: 1}
    tags: [military, command]
    impl: theme_system
    stars:
      1:
        max_act: -1
        effects:
          - rank_buff: {target: all_military, shield_per_rank: 0.02, atk_per_unit: 0.005, enhanced_shield_bonus: 0.03}
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - rank_buff_hp: {target: all_military, hp_per_rank: 0.03}  # R4: 모든 군대 HP +3%/rank
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - buff: {target: all_military, as_bonus: 0.15}  # R10: 모든 군대 AS +15%
      2:
        max_act: -1
        effects:
          - rank_buff: {target: all_military, shield_per_rank: 0.03, atk_per_unit: 0.008, enhanced_shield_bonus: 0.05}
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - rank_buff_hp: {target: all_military, hp_per_rank: 0.03}
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - buff: {target: all_military, as_bonus: 0.15}
      3:
        max_act: -1
        effects:
          - rank_buff: {target: all_military, shield_per_rank: 0.04, atk_per_unit: 0.01, enhanced_shield_bonus: 0.08}
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - rank_buff_hp: {target: all_military, hp_per_rank: 0.03}
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - buff: {target: all_military, as_bonus: 0.15}

  ml_assault:
    name: 돌격 편대
    tier: 3
    theme: military
    timing: RS   # BS → RS (구조 B 재정의: 생산 카드로 전환)
    comp:
      - {unit: ml_biker, n: 2}
      - {unit: ml_recruit, n: 1}
    tags: [military, assault]
    impl: theme_system
    stars:
      1:
        max_act: -1
        effects:
          - spawn_unit: {target: self, unit: ml_biker, count: 1}  # 매 RS 바이커 1기
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - swarm_buff:
                  target: all_military
                  atk_per_unit: 0.005
                  ms_bonus: {unit_thresh: 15, bonus: 1}
                  enhanced_count: 2
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - lifesteal: {target: all_military, pct: 0.10}  # 모든 군대 유닛 라이프스틸 10%
      2:
        max_act: -1
        effects:
          - spawn_unit: {target: self, unit: ml_biker, count: 2}
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - swarm_buff:
                  target: all_military
                  atk_per_unit: 0.005
                  ms_bonus: {unit_thresh: 12, bonus: 1}
                  enhanced_count: 2
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - lifesteal: {target: all_military, pct: 0.10}
      3:
        max_act: -1
        effects:
          - spawn_unit: {target: self, unit: ml_biker, count: 4}  # ★3: 일반 바이커 4기
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - swarm_buff:
                  target: all_military
                  atk_per_unit: 0.005
                  ms_bonus: {unit_thresh: 10, bonus: 1}
                  enhanced_count: 2
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - lifesteal: {target: all_military, pct: 0.10}

  ml_special_ops:
    name: 특수 작전대
    tier: 4
    theme: military
    timing: RS
    comp:
      - {unit: ml_sniper, n: 1}
      - {unit: ml_walker, n: 1}
    tags: [military, elite]
    impl: theme_system
    stars:
      1:
        max_act: -1
        effects:
          - crit_buff: {target: self, chance: 0.10, mult: 2.0}  # 이 카드 유닛 크리 10% × 2.0
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - crit_buff: {target: self, chance: 0.20, mult: 2.0}  # 확률 20% (R0 대체)
              - crit_splash: {target: self, splash_pct: 0.25}        # 크리 시 인접 적 25% 스플래시
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - crit_buff: {target: self, chance: 0.30, mult: 2.0}
              - crit_splash: {target: self, splash_pct: 0.50}
      2:
        max_act: -1
        effects:
          - crit_buff: {target: self, chance: 0.10, mult: 3.0}
          - spawn_unit: {target: self, unit: ml_sniper, count: 1}  # 매 RS 저격 드론 1기
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - crit_buff: {target: self, chance: 0.20, mult: 3.0}
              - crit_splash: {target: self, splash_pct: 0.25}
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - crit_buff: {target: self, chance: 0.30, mult: 3.0}
              - crit_splash: {target: self, splash_pct: 0.50}
      3:
        max_act: -1
        effects:
          - crit_buff: {target: self, chance: 0.10, mult: 6.0}
          - spawn_unit: {target: self, unit: ml_sniper, count: 3}  # 매 RS 저격 드론 3기
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - crit_buff: {target: self, chance: 0.20, mult: 6.0}
              - crit_splash: {target: self, splash_pct: 0.25}
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - crit_buff: {target: self, chance: 0.30, mult: 6.0}
              - crit_splash: {target: self, splash_pct: 0.50}

  ml_factory:
    name: 군수 공장
    tier: 4
    theme: military
    timing: OE
    listen: {l2: CO}
    comp:
      - {unit: ml_artillery, n: 1}
      - {unit: ml_sniper, n: 1}
    tags: [military, supply]
    impl: theme_system
    stars:
      1:
        max_act: -1
        effects:
          - counter_produce: {event: CO, threshold: 10, rewards: {global_military_atk_pct: 0.05}}
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - upgrade_shop_bonus: {slot_delta: 1, terazin_discount: 1}  # 상점 슬롯 +1, -1 테라진
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - upgrade_shop_bonus: {slot_delta: 1, terazin_discount: 1}  # R4와 누적: 총 슬롯 +2, 할인 -2
      2:
        max_act: -1
        effects:
          - counter_produce: {event: CO, threshold: 8, rewards: {global_military_atk_pct: 0.07}}
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - upgrade_shop_bonus: {slot_delta: 1, terazin_discount: 1}
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - upgrade_shop_bonus: {slot_delta: 1, terazin_discount: 1}  # R4 누적: 총 +2/-2
      3:
        max_act: -1
        effects:
          - counter_produce: {event: CO, threshold: 6, rewards: {global_military_atk_pct: 0.10, global_military_range_bonus: 1}}
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - upgrade_shop_bonus: {slot_delta: 1, terazin_discount: 1}
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - upgrade_shop_bonus: {slot_delta: 1, terazin_discount: 1}  # R4 누적: 총 +2/-2

  ml_command:
    name: 통합 사령부
    tier: 5
    theme: military
    timing: RS
    comp:
      - {unit: ml_commander, n: 1}
      - {unit: ml_walker, n: 1}
      - {unit: ml_artillery, n: 1}
    tags: [military, headquarters]
    impl: theme_system
    stars:
      1:
        max_act: -1
        effects:
          - train: {target: all_military, amount: 1}
          - revive: {target: self_enhanced, hp_pct: 0.25, limit_per_combat: 1}
        r_conditional:
          - when: {rank_gte: 4}
            effects:
              - enhance_convert_card: {fraction: 0.5}
              - revive_scope_override: {target: self_all}        # 이 카드 모든 유닛
          - when: {rank_gte: 10}
            effects:
              - enhance_convert_card: {fraction: 1.0}
              - revive_scope_override: {target: self_and_adj_all} # 이 카드 + 양옆 인접 전체
      2:
        max_act: -1
        effects:
          - train: {target: all_military, amount: 1}
